<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חידון פסח - חומת שמואל</title>
    <style>
        :root { --pink: #e91e63; --teal: #00bcd4; --gold: #d4af37; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--light); text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 4px solid var(--teal); overflow: hidden; }
        .header { background: var(--teal); color: white; padding: 20px; border-bottom: 4px solid var(--gold); }
        .quiz-content { padding: 30px; }
        .question { font-size: 22px; font-weight: bold; margin-bottom: 20px; color: #333; }
        .option { display: block; width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; cursor: pointer; font-size: 18px; transition: 0.3s; background: #fff; }
        .option:hover { background: #e0f7fa; border-color: var(--teal); }
        .button { background: var(--pink); color: white; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 20px; }
        input { width: 80%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>חידון הלכות פסח - תשפ"ו</h1>
        <p>בית הספר חומת שמואל</p>
    </div>
    
    <div class="quiz-content" id="quiz-box">
        <div id="setup">
            <h3>ברוכים הבאים!</h3>
            <p>הכניסו פרטים כדי להתחיל בחידון:</p>
            <input type="text" id="pName" placeholder="שם מלא"><br>
            <input type="text" id="pClass" placeholder="כיתה"><br>
            <button class="button" onclick="start()">מתחילים!</button>
        </div>
        
        <div id="question-area" style="display:none;">
            <div class="question" id="qText">כמה זמן לוקח לבצק להפוך לחמץ?</div>
            <div id="options">
                <button class="option" onclick="check(true)">18 דקות</button>
                <button class="option" onclick="check(false)">24 דקות</button>
                <button class="option" onclick="check(false)">שעה עגולה</button>
            </div>
        </div>
    </div>
</div>

<script>
    function start() {
        if(document.getElementById('pName').value == "") { alert("נא להזין שם"); return; }
        document.getElementById('setup').style.display = 'none';
        document.getElementById('question-area').style.display = 'block';
    }
    function check(isCorrect) {
        if(isCorrect) { alert("כל הכבוד! תשובה נכונה לפי החוברת."); }
        else { alert("לא נורא, כדאי לחזור על החומר בחוברת."); }
    }
</script>

</body>
</html>
